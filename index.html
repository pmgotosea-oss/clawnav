<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾导航 ClawNav - OpenClaw中文社区</title>
    <link rel="stylesheet" href="css/style.css?v=12">
    <link rel="icon" href="https://www.google.com/s2/favicons?domain=openclaw.ai&sz=64">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo">
                <img src="https://www.google.com/s2/favicons?domain=openclaw.ai&sz=64" alt="Logo" class="logo-icon">
                <span class="logo-text">龙虾导航 ClawNav</span>
            </a>
            <nav class="nav">
                <a href="/" class="nav-link active">首页</a>
            </nav>
        </div>
        <div class="header-right">
            <a href="#" class="feishu-group" onclick="showFeishuModal()">
                <img src="https://www.google.com/s2/favicons?domain=feishu.cn&sz=32" alt="飞书" class="vip-icon">
                <span>飞书群</span>
            </a>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <div class="search-engines">
                    <button class="engine-btn active" data-engine="google">谷歌</button>
                    <button class="engine-btn" data-engine="baidu">百度</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="畅玩小龙虾，尽在 ClawNav" autocomplete="off">
                    <button class="search-btn" onclick="performSearch()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <ul class="category-list" id="categoryList">
                    <li class="category-item active" data-category="all">
                        <span class="category-icon">🔥</span>
                        <span>全部资源</span>
                    </li>
                    <li class="category-item" data-category="deploy">
                        <span class="category-icon">🦞</span>
                        <span>龙虾图鉴</span>
                    </li>
                    <li class="category-item" data-category="server">
                        <span class="category-icon">☁️</span>
                        <span>云服务</span>
                    </li>
                    <li class="category-item" data-category="learn">
                        <span class="category-icon">📖</span>
                        <span>学习资源</span>
                    </li>
                    <li class="category-item" data-category="aiapp">
                        <span class="category-icon">🤖</span>
                        <span>AI应用</span>
                    </li>
                    <li class="category-item" data-category="devplan">
                        <span class="category-icon">💻</span>
                        <span>Coding Plan</span>
                    </li>
                    <li class="category-item" data-category="modelapi">
                        <span class="category-icon">🔌</span>
                        <span>模型接口</span>
                    </li>
                    <li class="category-item" data-category="llm">
                        <span class="category-icon">🧠</span>
                        <span>MaaS平台</span>
                    </li>
                    <li class="category-item" data-category="plugin">
                        <span class="category-icon">🔧</span>
                        <span>Skill市场</span>
                    </li>
                    <li class="category-item" data-category="community">
                        <span class="category-icon">👥</span>
                        <span>社区交流</span>
                    </li>
                    <li class="category-item" data-category="payment">
                        <span class="category-icon">💳</span>
                        <span>支付工具</span>
                    </li>
                    <li class="category-item" data-category="trade">
                        <span class="category-icon">📈</span>
                        <span>交易工具</span>
                    </li>
                    <li class="category-item" data-category="exchange">
                        <span class="category-icon">🏦</span>
                        <span>交易平台</span>
                    </li>
                    <li class="category-item" data-category="hardware">
                        <span class="category-icon">🖥️</span>
                        <span>硬件设备</span>
                    </li>
                </ul>
            </aside>

            <!-- Content Area -->
            <main class="content">
                <div id="resourcesContainer">
                    <!-- Resources will be loaded here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Feishu Modal -->
    <div class="modal" id="wechatModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeFeishuModal()">&times;</span>
            <h3>加入飞书群</h3>
            <p>直接扫码即可加入飞书群</p>
            <div class="qrcode-placeholder">
                <img src="images/feishu-qrcode.jpg" alt="飞书群二维码" style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2024 龙虾导航 ClawNav | OpenClaw 中文社区</p>
    </footer>

    <script src="js/data.js?v=12"></script>
    <script src="js/main.js?v=12"></script>
</body>
</html>
